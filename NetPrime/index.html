<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NetPrime | Login</title>

    <link
        href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
        rel="stylesheet"
    />

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:"Poppins",sans-serif;
        }

        body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;

    background:url(bg.jpg) no-repeat;
    background-size:cover;
    background-position:center;

    overflow:hidden;
    position:relative;
}

        .wrapper{
    width:420px;
    background:rgba(0,0,0,0.15);
    border:2px solid rgba(255,255,255,.2);
    backdrop-filter:blur(12px);
    color:#fff;
    border-radius:15px;
    padding:35px 40px;
    z-index:2;
}

        .wrapper h1{
            text-align:center;
            font-size:36px;
            margin-bottom:10px;
        }

        .input-box{
            position:relative;
            width:100%;
            height:50px;
            margin:25px 0;
        }

        .input-box input{
            width:100%;
            height:100%;
            background:transparent;
            border:2px solid rgba(255,255,255,.2);
            outline:none;
            border-radius:40px;
            color:#fff;
            font-size:16px;
            padding:20px 45px 20px 20px;
        }

        .input-box input::placeholder{
            color:#fff;
        }

        .input-box i{
            position:absolute;
            right:20px;
            top:50%;
            transform:translateY(-50%);
            font-size:20px;
        }

        .remember-forgot{
            display:flex;
            justify-content:space-between;
            font-size:14px;
            margin:-10px 0 20px;
        }

        .remember-forgot a{
            color:#fff;
            text-decoration:none;
        }

        .remember-forgot a:hover{
            text-decoration:underline;
        }

        .btn{
            width:100%;
            height:45px;
            border:none;
            border-radius:40px;
            background:#fff;
            color:#111;
            font-size:16px;
            font-weight:600;
            cursor:pointer;
            transition:.3s;
        }

        .btn:hover{
            background:#E50914;
            color:#fff;
        }

        .register-link{
            text-align:center;
            margin-top:20px;
            font-size:14px;
        }

        .register-link a{
            color:#fff;
            text-decoration:none;
            font-weight:bold;
        }

        .register-link a:hover{
            text-decoration:underline;
        }

        .login-footer{
    margin-top:25px;
    padding-top:20px;
    border-top:1px solid rgba(255,255,255,.25);
    text-align:center;
    font-size:14px;
    color:#fff;
}

.login-footer p{
    margin:6px 0;
}

.login-footer strong{
    color:#E50914;
}

        .back-video{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center;
    z-index:-1;
}

        @media(max-width:480px){
            .wrapper{
                width:90%;
            }
        }
    </style>
</head>

<body>

<video autoplay loop muted playsinline class="back-video">
    <source src="video backgrounds/jujutsu.mp4">
</video>

<div class="wrapper">

<form id="loginForm">

<h1>Login</h1>

<div class="input-box">
    <input
        type="text"
        id="username"
        placeholder="Username"
        required
    >
    <i class='bx bxs-user'></i>
</div>

<div class="input-box">
    <input
        type="password"
        id="password"
        placeholder="Password"
        required
    >
    <i class='bx bxs-lock-alt'></i>
</div>

<div class="remember-forgot">
    <label>
        <input type="checkbox">
        Remember Me
    </label>

    <a href="#">Forgot Password?</a>
</div>

<button class="btn" type="submit">
    Login
</button>

<div class="register-link">
    <p>
        Don't have an account?
        <a href="#">Register</a>
    </p>
</div>

<div class="login-footer">
    <p>© 2026 NetPrime. All Rights Reserved.</p>
    <p>Developed by <strong>Surya Ramisetty</strong></p>
</div>

</form>

</div>

<script>
document.getElementById("loginForm").addEventListener("submit",function(event){

    event.preventDefault();

    const username=document.getElementById("username").value;
    const password=document.getElementById("password").value;

    if(username==="surya" && password==="surya"){
        window.location.href="home.html";
    }
    else{
        alert("Incorrect username or password");
    }

});
</script>

</body>
</html>
